name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 8.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5

    # 🔐 PENJAGA PRIVASI: Ambil Base64 dari Secret, Dekode ke folder app/ secara senyap sebelum build
    - name: Rekonstruksi Google Services JSON Secara Aman
      run: |
        echo "${{ secrets.FIREBASE_SECRET_JSON }}" | base64 --decode > app/google-services.json

    # PROSES AMAN: Alirkan Token Vault dari GitHub Secret ke dalam Environment Kompiler
    - name: Build with Gradle 8.5
      run: gradle assembleDebug
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
