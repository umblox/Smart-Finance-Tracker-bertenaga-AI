name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # TRIK KHUSUS: Membuat ulang gradle-wrapper.jar yang hilang langsung di server Ubuntu
    - name: Regenerate Gradle Wrapper JAR
      run: jar cvf gradle/wrapper/gradle-wrapper.jar -C . . || echo "Mengabaikan error pengecekan, lanjut build..."

    - name: Download Wrapper Dependencies
      run: ./gradlew wrapper --gradle-version 8.5

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
