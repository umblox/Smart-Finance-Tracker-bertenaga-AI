name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # ⬅️ TAMBAHAN: Bisa jalanin manual dari tab Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 8.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5

    # ⬅️ TAMBAHAN: Decode keystore dari GitHub Secret ke file
    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/my-release-key.keystore

    # ⬅️ TAMBAHAN: Build APK Release (bukan Debug) dengan sign
    - name: Build Signed Release APK
      run: gradle assembleRelease
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    # ⬅️ TAMBAHAN: Upload APK Release yang sudah di-sign
    - name: Upload Signed APK
      uses: actions/upload-artifact@v4
      with:
        name: app-signed-release-apk
        path: app/build/outputs/apk/release/*.apk
