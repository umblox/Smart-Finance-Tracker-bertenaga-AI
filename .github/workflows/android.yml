name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 8.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5

    # 🔥 PROSES INJEKSI SECRET SUDAH DIHAPUS 
    # Sekarang sistem akan menggunakan google-services.json DUMMY 
    # yang sudah kita taruh di folder app/ agar proses build tetap berjalan normal.

    - name: Build with Gradle 8.5
      run: gradle assembleDebug
      # GROQ_API_KEY sudah dihapus dari environment variables di sini

    - name: Upload APK Results
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
