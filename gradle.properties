android.useAndroidX=true
android.enableJetifier=true
# Mengalokasikan RAM 4 Gigabyte secara kaku langsung ke core JVM Gradle Daemon
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError

# Aktifkan kompilasi paralel agar server build GitHub Actions bekerja lebih efisien
org.gradle.parallel=true

# Izinkan Gradle menggunakan memori cache yang sudah ada agar tidak membebani heap space baru
org.gradle.caching=true


